<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trazabilidad · Calter / Zarzalejo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --border: #d8d4cc;
    --border-dark: #a09890;
    --text: #1a1714;
    --text-muted: #6b635a;
    --accent: #2d5a27;
    --accent-light: #e8f0e7;
    --accent-hover: #1e3e1b;
    --danger: #8b2020;
    --danger-light: #fdf0f0;
    --warning: #7a5c00;
    --warning-light: #fdf8e7;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* TOP BAR */
  header {
    background: var(--text);
    color: #fff;
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: var(--mono); font-size: 1rem; font-weight: 600; letter-spacing: 0.08em; }
  .logo span { color: #7db87a; }
  .header-right { font-family: var(--mono); font-size: 0.7rem; color: #888; }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  nav button {
    font-family: var(--sans);
    font-size: 0.82rem;
    font-weight: 500;
    padding: 0.85rem 1.2rem;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    cursor: pointer;
    color: var(--text-muted);
    white-space: nowrap;
    transition: all 0.15s;
  }
  nav button:hover { color: var(--text); }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* MAIN */
  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  /* FORMS */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  label { font-size: 0.78rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  input, select, textarea {
    font-family: var(--sans);
    font-size: 0.9rem;
    padding: 0.55rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
  }

  /* BUTTONS */
  .btn {
    font-family: var(--sans);
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.6rem 1.25rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border-dark); }
  .btn-danger { background: var(--danger); color: #fff; }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--border-dark);
    border-radius: 6px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
  }
  .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-light); }
  .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }

  /* LOADING */
  .loading { display: flex; align-items: center; gap: 0.75rem; padding: 1.5rem; color: var(--text-muted); }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PRODUCT LINES */
  .product-line {
    display: grid;
    grid-template-columns: 2fr 1fr 1.5fr auto;
    gap: 0.5rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">CALTER <span>·</span> ZARZALEJO &nbsp;—&nbsp; <span style="font-weight:300;color:#aaa">Trazabilidad</span></div>
</header>

<nav>
  <button class="active" onclick="showPanel('registro')">📥 Registrar Albarán</button>
  <button onclick="showPanel('listado')">📋 Listado</button>
</nav>

<main>
<div id="panel-registro" class="panel active">
  <h2>Registrar Albarán</h2>
  <p class="subtitle">Sube el PDF. La IA extraerá el cliente, número y productos.</p>

  <div class="card">
    <div class="card-title">1. Subir PDF del albarán</div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('pdfInput').click()">
      <div class="upload-icon">📄</div>
      <p><strong>Haz clic para subir el PDF de albaranes</strong></p>
    </div>
    <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="processPDF(this.files[0])">
  </div>

  <div id="extractingCard" style="display:none" class="card">
    <div class="loading"><div class="spinner"></div>Analizando PDF con Gemini IA...</div>
  </div>

  <div id="formCard" style="display:none" class="card">
    <div class="card-title">2. Revisar datos extraídos</div>
    <div class="form-grid">
      <div class="form-group"><label>Nº Albarán</label><input type="text" id="f_albaran"></div>
      <div class="form-group"><label>Fecha</label><input type="date" id="f_fecha"></div>
      <div class="form-group"><label>Cliente</label><input type="text" id="f_cliente"></div>
    </div>
    <hr>
    <div class="card-title">Productos</div>
    <div id="lineasProducto"></div>
    <div class="btn-row" style="margin-top:15px">
      <button class="btn btn-primary" onclick="alert('Guardado en base de datos (Simulado)')">✓ Confirmar y Registrar</button>
      <button class="btn btn-secondary" onclick="resetForm()">Cancelar</button>
    </div>
  </div>
</div>
</main>

<script>
// CONFIGURACIÓN API
const API_KEY = "TU_API_KEY_DE_GEMINI"; // <--- CAMBIA ESTO POR TU KEY
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

async function processPDF(file) {
  if (!file) return;
  document.getElementById('extractingCard').style.display = 'block';
  document.getElementById('formCard').style.display = 'none';

  try {
    // 1. Extraer texto del PDF
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
    let fullText = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      fullText += content.items.map(item => item.str).join(" ");
    }

    // 2. Llamar a Gemini
    const rawResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `Extrae los siguientes datos de este albarán en formato JSON: numero_albaran, fecha (YYYY-MM-DD), cliente, y una lista de productos con (nombre, cantidad). Texto: ${fullText}` }] }]
      })
    });

    const data = await rawResponse.json();
    const textResponse = data.candidates[0].content.parts[0].text;
    const jsonStr = textResponse.match(/\{[\s\S]*\}/)[0];
    const albaran = JSON.parse(jsonStr);

    // 3. Rellenar formulario
    document.getElementById('f_albaran').value = albaran.numero_albaran || '';
    document.getElementById('f_fecha').value = albaran.fecha || '';
    document.getElementById('f_cliente').value = albaran.cliente || '';
    
    const container = document.getElementById('lineasProducto');
    container.innerHTML = "";
    albaran.productos.forEach(p => {
      container.innerHTML += `
        <div class="product-line">
          <input type="text" value="${p.nombre}">
          <input type="text" value="${p.cantidad}">
          <input type="text" placeholder="Lote (Manual)">
          <button class="btn btn-danger btn-small" onclick="this.parentElement.remove()">✕</button>
        </div>`;
    });

    document.getElementById('formCard').style.display = 'block';
  } catch (e) {
    alert("Error procesando: " + e.message);
  } finally {
    document.getElementById('extractingCard').style.display = 'none';
  }
}

function resetForm() {
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('pdfInput').value = "";
}

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
}
</script>
</body>
</html>
